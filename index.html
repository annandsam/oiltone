<!DOCTYPE html>
<html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;cursor:none}</style></head>
<body>
<canvas id="c" style="display:block;width:100%;height:600px"></canvas>
<script>
const cv=document.getElementById('c');
cv.width=680;cv.height=600;
const W=680,H=600;
const gl=cv.getContext('webgl',{antialias:false,preserveDrawingBuffer:false});

const VS=`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
const FS=`
precision highp float;
uniform vec2 res;
uniform float time;
uniform vec2 blobs[6];
uniform float blobR[6];
uniform vec2 mouse;
uniform float mouseStr;
uniform float clickStr;
uniform sampler2D distTex;
uniform vec4 c0,c1,c2,c3;
uniform float grainSeed;
uniform float flickerA;
uniform float flickerB;
uniform vec2 pressureNoise;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p);vec2 f=fract(p);
  f=f*f*(3.0-2.0*f);
  float a=hash(i);float b=hash(i+vec2(1,0));
  float c=hash(i+vec2(0,1));float d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

void main(){
  vec2 px=gl_FragCoord.xy;
  vec2 uv=px/res;

  vec2 centered=uv-0.5;
  float breathe=1.0+sin(time*0.07)*0.004;
  vec2 buv=centered*breathe+0.5;
  vec2 bpx=buv*res;

  float v=0.0;
  for(int i=0;i<6;i++){
    vec2 d=bpx-blobs[i];
    float r2=blobR[i]*blobR[i];
    v+=r2/(dot(d,d)+r2*0.15);
  }
  float dist=texture2D(distTex,buv).r*8.0;
  v+=dist*0.55;

  // organic press — warp in Cartesian space, no atan2, no seam
  vec2 md=bpx-mouse;
  float mR=65.0+clickStr*40.0;
  float mStr=(2.2+clickStr*3.0)*mouseStr;
  // sample noise at a position that rotates slowly around the cursor offset
  vec2 normMd=md/(mR+0.001);
  float warp1=noise(normMd*1.8+pressureNoise)*0.22;
  float warp2=noise(normMd*3.2-pressureNoise.yx*0.7+0.5)*0.10;
  float warpedDist2=dot(md,md)*pow(1.0+warp1+warp2,2.0);
  v+=mStr*mR*mR/(warpedDist2+mR*mR*0.18);

  v+=sin(buv.x*3.8+time*0.14)*0.35;
  v+=cos(buv.y*3.1-time*0.11)*0.32;
  v+=sin((buv.x+buv.y)*4.9+time*0.08)*0.18;

  float b1=(sin(v*1.4+time*0.18)+1.0)*0.5;
  float b2=(sin(v*2.6-time*0.13)+1.0)*0.5;
  float b3=(cos(v*0.9+time*0.22)+1.0)*0.5;
  vec4 ca=mix(c0,c1,b1);
  vec4 cb=mix(c2,c3,b2);
  vec3 col=mix(ca,cb,b3).rgb;

  col=col*0.92+0.02;
  col=col*col*(3.0-2.0*col);

  float lum=dot(col,vec3(0.299,0.587,0.114));
  col.r+=smoothstep(0.4,0.9,lum)*0.045;
  col.b+=smoothstep(0.6,0.0,lum)*0.045;
  col.g+=smoothstep(0.2,0.6,lum)*smoothstep(0.9,0.5,lum)*0.025;

  vec2 vd=buv-0.5;
  float edgeDist=dot(vd,vd)*4.0;
  float aberr=edgeDist*0.014;
  vec2 rUV=buv+vd*aberr;
  vec2 bUV=buv-vd*aberr*0.7;
  float vr=0.0,vb=0.0;
  for(int i=0;i<6;i++){
    vec2 dr=rUV*res-blobs[i];float r2=blobR[i]*blobR[i];
    vr+=r2/(dot(dr,dr)+r2*0.15);
    vec2 db=bUV*res-blobs[i];
    vb+=r2/(dot(db,db)+r2*0.15);
  }
  float b1r=(sin(vr*1.4+time*0.18)+1.0)*0.5;
  float b2r=(sin(vr*2.6-time*0.13)+1.0)*0.5;
  float b3r=(cos(vr*0.9+time*0.22)+1.0)*0.5;
  vec3 colR=mix(mix(c0,c1,b1r),mix(c2,c3,b2r),b3r).rgb;
  float b1b=(sin(vb*1.4+time*0.18)+1.0)*0.5;
  float b2b=(sin(vb*2.6-time*0.13)+1.0)*0.5;
  float b3b=(cos(vb*0.9+time*0.22)+1.0)*0.5;
  vec3 colB=mix(mix(c0,c1,b1b),mix(c2,c3,b2b),b3b).rgb;
  col.r=mix(col.r,colR.r,clamp(edgeDist*0.4,0.0,1.0));
  col.b=mix(col.b,colB.b,clamp(edgeDist*0.3,0.0,1.0));

  float vign=1.0-pow(dot(vd,vd)*3.0,1.1)*0.68;
  vign=max(0.0,vign);
  col*=vign;
  col.r+=pow(1.0-vign,2.0)*0.015;

  float brightness=dot(col,vec3(0.5,0.4,0.1));
  col.r+=brightness*(1.0-lum)*0.08;

  vec2 gUV=uv+vec2(grainSeed,grainSeed*0.7);
  float midMask=1.0-abs(lum-0.5)*0.8;
  float gr1=(hash(gUV)-0.5)*0.11*midMask;
  float gg1=(hash(gUV+0.31)-0.5)*0.10*midMask;
  float gb1=(hash(gUV+0.62)-0.5)*0.12*midMask;
  float clump=noise(gUV*18.0+grainSeed)*0.5+0.5;
  float gr2=(hash(gUV*0.4+0.11)-0.5)*0.07*clump;
  float gg2=(hash(gUV*0.4+0.44)-0.5)*0.06*clump;
  float gb2=(hash(gUV*0.4+0.77)-0.5)*0.08*clump;
  float blotch=noise(gUV*6.0+grainSeed*0.3);
  float grainBlotch=(blotch-0.5)*0.05*midMask;
  col=clamp(col+vec3(gr1+gr2,gg1+gg2,gb1+gb2)+grainBlotch,0.0,1.0);

  col*=flickerA;
  float scanY=mod(uv.y+time*0.04,1.0);
  float scan=1.0-smoothstep(0.0,0.04,scanY)*smoothstep(0.12,0.04,scanY)*0.04*flickerB;
  col*=scan;

  gl_FragColor=vec4(col,1.0);
}`;

function compile(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aLoc=gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'res');
const uTime=gl.getUniformLocation(prog,'time');
const uBlobs=gl.getUniformLocation(prog,'blobs');
const uBlobR=gl.getUniformLocation(prog,'blobR');
const uMouse=gl.getUniformLocation(prog,'mouse');
const uMouseStr=gl.getUniformLocation(prog,'mouseStr');
const uClickStr=gl.getUniformLocation(prog,'clickStr');
const uDistTex=gl.getUniformLocation(prog,'distTex');
const uC0=gl.getUniformLocation(prog,'c0');
const uC1=gl.getUniformLocation(prog,'c1');
const uC2=gl.getUniformLocation(prog,'c2');
const uC3=gl.getUniformLocation(prog,'c3');
const uGrain=gl.getUniformLocation(prog,'grainSeed');
const uFlickerA=gl.getUniformLocation(prog,'flickerA');
const uFlickerB=gl.getUniformLocation(prog,'flickerB');
const uPressureNoise=gl.getUniformLocation(prog,'pressureNoise');
gl.uniform2f(uRes,W,H);

const distTex=gl.createTexture();
gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,distTex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.uniform1i(uDistTex,0);

const DW=170,DH=150;
const distData=new Float32Array(DW*DH);
const distPixels=new Uint8Array(DW*DH*4);
function uploadDist(){
  for(let i=0;i<DW*DH;i++){
    const v=Math.min(255,Math.max(0,distData[i]*32));
    distPixels[i*4]=v;distPixels[i*4+1]=v;distPixels[i*4+2]=v;distPixels[i*4+3]=255;
  }
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,DW,DH,0,gl.RGBA,gl.UNSIGNED_BYTE,distPixels);
}
uploadDist();

function addToDist(x,y,str,radius){
  const sx=x/W*DW,sy=y/H*DH,sr=radius/W*DW;
  const r=Math.ceil(sr);
  const x0=Math.max(0,Math.floor(sx-r)),x1=Math.min(DW-1,Math.ceil(sx+r));
  const y0=Math.max(0,Math.floor(sy-r)),y1=Math.min(DH-1,Math.ceil(sy+r));
  const r2=sr*sr;
  for(let py=y0;py<=y1;py++) for(let px=x0;px<=x1;px++){
    const dx=px-sx,dy=py-sy,d2=dx*dx+dy*dy;
    if(d2<r2){const f=1-d2/r2;distData[py*DW+px]+=str*f*f;}
  }
}

const PALETTES=[
  [[1,.22,.04],[1,.67,.0],[.59,.04,.92],[0,.78,1]],
  [[0,.9,.55],[0,.59,1],[.51,0,.92],[1,.9,.2]],
  [[1,.04,.39],[.9,.22,.98],[.22,0,.9],[0,.86,1]],
  [[1,.51,0],[1,.18,0],[.67,.96,0],[0,.27,.96]],
  [[.86,.9,1],[.55,.72,1],[.22,.43,.94],[.03,.03,.22]],
];
let pi=0,nextP=1100,morphSrc=PALETTES[0],morphDst=PALETTES[1],morphT=1,tick=0;
function ss(x){return x*x*(3-2*x);}
function lerpP(a,b,tt){return a.map((v,i)=>v+(b[i]-v)*tt);}
function getPal(){return morphT>=1?morphDst:morphSrc.map((v,i)=>lerpP(v,morphDst[i],ss(morphT)));}

const blobs=Array.from({length:6},(_,i)=>({
  x:W*(0.18+i*0.13),y:H*(0.28+Math.sin(i*2.1)*0.28),
  vx:(Math.random()-.5)*0.1,vy:(Math.random()-.5)*0.08,
  r:W*(0.13+i*0.015),
  dx:Math.random()*Math.PI*2,dy:Math.random()*Math.PI*2,
  dsx:0.0004+Math.random()*0.0003,dsy:0.0003+Math.random()*0.0003,
  ph:i*1.3,ps:0.0012+i*0.0005,
  mass:0.8+i*0.1,tvx:0,tvy:0,
}));

let rawX=W/2,rawY=H/2,smx=W/2,smy=H/2,smx2=W/2,smy2=H/2;
let mvx=0,mvy=0,mspeed=0;
let mouseDown=false,mouseInside=false,pressure=0,clickPressure=0;
let t=0;
let flickerA=1.0,flickerTarget=1.0,flickerB=1.0;
let pNoiseX=Math.random()*10,pNoiseY=Math.random()*10;

function toCanvas(e){
  const r=cv.getBoundingClientRect();
  return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};
}
cv.addEventListener('mousemove',e=>{const p=toCanvas(e);rawX=p.x;rawY=p.y;mouseInside=true;});
cv.addEventListener('mouseleave',()=>{mouseInside=false;mouseDown=false;});
cv.addEventListener('mouseenter',e=>{mouseInside=true;const p=toCanvas(e);rawX=p.x;rawY=p.y;smx=p.x;smy=p.y;smx2=p.x;smy2=p.y;});
cv.addEventListener('mousedown',()=>{mouseDown=true;});
cv.addEventListener('mouseup',()=>{mouseDown=false;});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=toCanvas(e.touches[0]);rawX=p.x;rawY=p.y;mouseInside=true;},{passive:false});
cv.addEventListener('touchstart',e=>{e.preventDefault();const p=toCanvas(e.touches[0]);rawX=p.x;rawY=p.y;smx=p.x;smy=p.y;smx2=p.x;smy2=p.y;mouseInside=true;mouseDown=true;},{passive:false});
cv.addEventListener('touchend',()=>{mouseDown=false;mouseInside=false;});

let fc=0;
function loop(){
  t+=0.016;tick++;
  morphT=Math.min(1,morphT+0.002);
  if(tick>=nextP){
    morphSrc=getPal();pi=(pi+1)%PALETTES.length;morphDst=PALETTES[pi];morphT=0;
    nextP=tick+900+Math.floor(Math.random()*400);
  }
  smx+=(rawX-smx)*0.18;smy+=(rawY-smy)*0.18;
  const prevSmx2=smx2,prevSmy2=smy2;
  smx2+=(smx-smx2)*0.10;smy2+=(smy-smy2)*0.10;
  const ivx=smx2-prevSmx2,ivy=smy2-prevSmy2;
  mvx+=(ivx-mvx)*0.06;mvy+=(ivy-mvy)*0.06;
  mspeed=Math.min(10,mspeed+(Math.sqrt(mvx*mvx+mvy*mvy)-mspeed)*0.06);
  pressure+=((mouseInside?1:0)-pressure)*0.035;
  clickPressure+=((mouseDown?1:0)-clickPressure)*0.022;
  const glY=H-smy2;

  pNoiseX+=0.003;pNoiseY+=0.002;

  if(mouseInside&&pressure>0.05){
    const spd=Math.sqrt(ivx*ivx+ivy*ivy);
    if(spd>0.2||clickPressure>0.05)
      addToDist(smx2,glY,(1.2+clickPressure*2.0)*pressure,48+clickPressure*38);
  }
  for(let i=0;i<distData.length;i++)distData[i]*=0.983;

  if(Math.random()<0.015) flickerTarget=0.93+Math.random()*0.06;
  else if(Math.random()<0.003) flickerTarget=0.88+Math.random()*0.05;
  else flickerTarget+=(1.0-flickerTarget)*0.03;
  flickerA+=(flickerTarget-flickerA)*0.08;
  flickerB=0.5+Math.random()*0.5;

  blobs.forEach(b=>{
    b.dx+=b.dsx;b.dy+=b.dsy;b.ph+=b.ps;
    if(mouseInside&&pressure>0.01){
      const bdx=b.x-smx2,bdy=b.y-glY;
      const bd=Math.sqrt(bdx*bdx+bdy*bdy)+0.001;
      const zone=b.r*2.5;
      if(bd<zone){
        const force=(1-bd/zone)*(0.003+clickPressure*0.006)/b.mass;
        b.tvx-=(bdx/bd)*force;b.tvy-=(bdy/bd)*force;
      }
    }
    b.vx+=(b.tvx-b.vx)*0.06;b.vy+=(b.tvy-b.vy)*0.06;
    b.tvx*=0.90;b.tvy*=0.90;
    b.x+=b.vx+Math.sin(b.dx)*0.18+Math.sin(b.ph)*0.10;
    b.y+=b.vy+Math.cos(b.dy)*0.14+Math.cos(b.ph*0.7)*0.08;
    b.vx+=(Math.random()-.5)*0.003;b.vy+=(Math.random()-.5)*0.003;
    b.vx*=0.999;b.vy*=0.999;
    b.vx=Math.max(-.3,Math.min(.3,b.vx));b.vy=Math.max(-.3,Math.min(.3,b.vy));
    if(b.x<-b.r)b.x=W+b.r;if(b.x>W+b.r)b.x=-b.r;
    if(b.y<-b.r)b.y=H+b.r;if(b.y>H+b.r)b.y=-b.r;
  });

  const pal=getPal();
  gl.uniform1f(uTime,t);
  gl.uniform2fv(uBlobs,blobs.flatMap(b=>[b.x,b.y]));
  gl.uniform1fv(uBlobR,blobs.map(b=>b.r));
  gl.uniform2f(uMouse,smx2,glY);
  gl.uniform1f(uMouseStr,pressure);
  gl.uniform1f(uClickStr,clickPressure);
  gl.uniform4f(uC0,...pal[0],1);gl.uniform4f(uC1,...pal[1],1);
  gl.uniform4f(uC2,...pal[2],1);gl.uniform4f(uC3,...pal[3],1);
  gl.uniform1f(uGrain,Math.random());
  gl.uniform1f(uFlickerA,flickerA);
  gl.uniform1f(uFlickerB,flickerB);
  gl.uniform2f(uPressureNoise,pNoiseX,pNoiseY);
  fc++;
  if(fc%3===0)uploadDist();
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
