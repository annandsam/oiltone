<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>oil field</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;}
body.is-fullscreen{cursor:none;}
canvas{display:block;width:100vw;height:100vh;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;}
#ui{
  position:fixed;bottom:24px;right:24px;
  z-index:10;opacity:0.5;transition:opacity 0.4s;
}
#ui.hidden{opacity:0;pointer-events:none;}
#ui:hover{opacity:1;}
.btn{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;font-size:13px;font-family:sans-serif;
  padding:8px 14px;border-radius:20px;cursor:pointer;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  user-select:none;-webkit-user-select:none;
}
.btn:active{background:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="btn" id="fsBtn">⛶ fullscreen</div>
</div>
<script>
const cv=document.getElementById('c');
const ui=document.getElementById('ui');
const fsBtn=document.getElementById('fsBtn');

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;W=cv.width;H=cv.height;if(gl&&uRes)gl.uniform2f(uRes,W,H);}
let W,H;
cv.width=window.innerWidth;cv.height=window.innerHeight;
W=cv.width;H=cv.height;

const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)||
  (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
const fsSupported=!isIOS&&(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen);


function enterFS(){const el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}
function exitFS(){if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}
function isFS(){return !!(document.fullscreenElement||document.webkitFullscreenElement);}

if(isIOS){
  fsBtn.style.display='none';
} else if(fsSupported){
  fsBtn.addEventListener('click',()=>{if(!isFS())enterFS();});
  function onFSChange(){
    if(isFS()){
      document.body.classList.add('is-fullscreen');
      ui.classList.add('hidden');
    } else {
      document.body.classList.remove('is-fullscreen');
      showUI();
    }
  }
  document.addEventListener('fullscreenchange',onFSChange);
  document.addEventListener('webkitfullscreenchange',onFSChange);
} else {
  fsBtn.style.display='none';
}

let uiTimer;
function showUI(){if(isFS()) return; ui.classList.remove('hidden');clearTimeout(uiTimer);uiTimer=setTimeout(()=>ui.classList.add('hidden'),3000);}
document.addEventListener('mousemove',showUI);
document.addEventListener('touchstart',showUI,{passive:true});
setTimeout(()=>ui.classList.add('hidden'),3000);

const gl=cv.getContext('webgl',{antialias:false,preserveDrawingBuffer:false});

const VS=`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
const FS=`
precision highp float;
uniform vec2 res;
uniform float time;
uniform vec2 blobs[6];
uniform float blobR[6];
uniform vec2 mouse;
uniform float mouseStr;
uniform float clickStr;
uniform vec2 tPos[5];
uniform float tStr[5];
uniform float tClick[5];
uniform int tCount;
uniform float holdStr;
uniform sampler2D distTex;
uniform vec4 c0,c1,c2,c3;
uniform float grainSeed;
uniform float flickerA;
uniform float flickerB;
uniform vec2 pressureNoise;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p);vec2 f=fract(p);
  f=f*f*(3.0-2.0*f);
  float a=hash(i);float b=hash(i+vec2(1,0));
  float c=hash(i+vec2(0,1));float d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

void main(){
  vec2 px=gl_FragCoord.xy;
  vec2 uv=px/res;
  vec2 centered=uv-0.5;
  float breathe=1.0+sin(time*0.07)*0.004;
  vec2 buv=centered*breathe+0.5;
  vec2 bpx=buv*res;

  float v=0.0;
  for(int i=0;i<6;i++){
    vec2 d=bpx-blobs[i];
    float r2=blobR[i]*blobR[i];
    v+=r2/(dot(d,d)+r2*0.15);
  }
  float dist=texture2D(distTex,buv).r*8.0;
  v+=dist*0.55;

  // mouse attractor (desktop) or primary touch
  vec2 md=bpx-mouse;
  float mR=65.0+clickStr*55.0+holdStr*120.0;
  float mStrVal=(2.2+clickStr*4.5+holdStr*6.0)*mouseStr;
  vec2 normMd=md/(mR+0.001);
  float warp1=noise(normMd*1.8+pressureNoise)*0.22;
  float warp2=noise(normMd*3.2-pressureNoise.yx*0.7+0.5)*0.10;
  float warpedDist2=dot(md,md)*pow(1.0+warp1+warp2,2.0);
  v+=mStrVal*mR*mR/(warpedDist2+mR*mR*0.18);
  // additional touch attractors (iOS multitouch)
  for(int i=0;i<5;i++){
    if(i>=tCount) break;
    vec2 td=bpx-tPos[i];
    float tR=65.0+tClick[i]*55.0;
    float tS=(2.2+tClick[i]*4.5)*tStr[i];
    vec2 normTd=td/(tR+0.001);
    float tw1=noise(normTd*1.8+pressureNoise+float(i)*0.7)*0.22;
    float tw2=noise(normTd*3.2-pressureNoise.yx*0.7+float(i)*0.4)*0.10;
    float twd2=dot(td,td)*pow(1.0+tw1+tw2,2.0);
    v+=tS*tR*tR/(twd2+tR*tR*0.18);
  }

  v+=sin(buv.x*3.8+time*0.14)*0.35;
  v+=cos(buv.y*3.1-time*0.11)*0.32;
  v+=sin((buv.x+buv.y)*4.9+time*0.08)*0.18;

  float b1=(sin(v*1.4+time*0.18)+1.0)*0.5;
  float b2=(sin(v*2.6-time*0.13)+1.0)*0.5;
  float b3=(cos(v*0.9+time*0.22)+1.0)*0.5;
  vec4 ca=mix(c0,c1,b1);
  vec4 cb=mix(c2,c3,b2);
  vec3 col=mix(ca,cb,b3).rgb;

  col=col*0.92+0.02;
  col=col*col*(3.0-2.0*col);

  float lum=dot(col,vec3(0.299,0.587,0.114));
  col.r+=smoothstep(0.4,0.9,lum)*0.045;
  col.b+=smoothstep(0.6,0.0,lum)*0.045;
  col.g+=smoothstep(0.2,0.6,lum)*smoothstep(0.9,0.5,lum)*0.025;

  vec2 vd=buv-0.5;
  float edgeDist=dot(vd,vd)*4.0;
  float aberr=edgeDist*0.014;
  vec2 rUV=buv+vd*aberr;
  vec2 bUV=buv-vd*aberr*0.7;
  float vr=0.0,vb=0.0;
  for(int i=0;i<6;i++){
    vec2 dr=rUV*res-blobs[i];float r2=blobR[i]*blobR[i];
    vr+=r2/(dot(dr,dr)+r2*0.15);
    vec2 db=bUV*res-blobs[i];
    vb+=r2/(dot(db,db)+r2*0.15);
  }
  float b1r=(sin(vr*1.4+time*0.18)+1.0)*0.5;
  float b2r=(sin(vr*2.6-time*0.13)+1.0)*0.5;
  float b3r=(cos(vr*0.9+time*0.22)+1.0)*0.5;
  vec3 colR=mix(mix(c0,c1,b1r),mix(c2,c3,b2r),b3r).rgb;
  float b1b=(sin(vb*1.4+time*0.18)+1.0)*0.5;
  float b2b=(sin(vb*2.6-time*0.13)+1.0)*0.5;
  float b3b=(cos(vb*0.9+time*0.22)+1.0)*0.5;
  vec3 colB=mix(mix(c0,c1,b1b),mix(c2,c3,b2b),b3b).rgb;
  col.r=mix(col.r,colR.r,clamp(edgeDist*0.4,0.0,1.0));
  col.b=mix(col.b,colB.b,clamp(edgeDist*0.3,0.0,1.0));

  float vign=1.0-pow(dot(vd,vd)*3.0,1.1)*0.68;
  vign=max(0.0,vign);
  col*=vign;
  col.r+=pow(1.0-vign,2.0)*0.015;

  float brightness=dot(col,vec3(0.5,0.4,0.1));
  col.r+=brightness*(1.0-lum)*0.08;

  vec2 gUV=uv+vec2(grainSeed,grainSeed*0.7);
  float midMask=1.0-abs(lum-0.5)*0.8;
  float gr1=(hash(gUV)-0.5)*0.11*midMask;
  float gg1=(hash(gUV+0.31)-0.5)*0.10*midMask;
  float gb1=(hash(gUV+0.62)-0.5)*0.12*midMask;
  float clump=noise(gUV*18.0+grainSeed)*0.5+0.5;
  float gr2=(hash(gUV*0.4+0.11)-0.5)*0.07*clump;
  float gg2=(hash(gUV*0.4+0.44)-0.5)*0.06*clump;
  float gb2=(hash(gUV*0.4+0.77)-0.5)*0.08*clump;
  float blotch=noise(gUV*6.0+grainSeed*0.3);
  float grainBlotch=(blotch-0.5)*0.05*midMask;
  col=clamp(col+vec3(gr1+gr2,gg1+gg2,gb1+gb2)+grainBlotch,0.0,1.0);

  col*=flickerA;
  float scanY=mod(uv.y+time*0.04,1.0);
  float scan=1.0-smoothstep(0.0,0.04,scanY)*smoothstep(0.12,0.04,scanY)*0.04*flickerB;
  col*=scan;

  gl_FragColor=vec4(col,1.0);
}`;

function compile(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aLoc=gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'res');
const uTime=gl.getUniformLocation(prog,'time');
const uBlobs=gl.getUniformLocation(prog,'blobs');
const uBlobR=gl.getUniformLocation(prog,'blobR');
const uMouse=gl.getUniformLocation(prog,'mouse');
const uMouseStr=gl.getUniformLocation(prog,'mouseStr');
const uClickStr=gl.getUniformLocation(prog,"clickStr");
const uHoldStr=gl.getUniformLocation(prog,"holdStr");
const uDistTex=gl.getUniformLocation(prog,'distTex');
const uC0=gl.getUniformLocation(prog,'c0');
const uC1=gl.getUniformLocation(prog,'c1');
const uC2=gl.getUniformLocation(prog,'c2');
const uC3=gl.getUniformLocation(prog,'c3');
const uGrain=gl.getUniformLocation(prog,'grainSeed');
const uFlickerA=gl.getUniformLocation(prog,'flickerA');
const uFlickerB=gl.getUniformLocation(prog,'flickerB');
const uPressureNoise=gl.getUniformLocation(prog,'pressureNoise');
const uTPos=gl.getUniformLocation(prog,'tPos');
const uTStr=gl.getUniformLocation(prog,'tStr');
const uTClick=gl.getUniformLocation(prog,'tClick');
const uTCount=gl.getUniformLocation(prog,'tCount');
gl.uniform2f(uRes,W,H);

const distTex=gl.createTexture();
gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,distTex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.uniform1i(uDistTex,0);

const DW=680,DH=600;
const distData=new Float32Array(DW*DH);
const distPixels=new Uint8Array(DW*DH*4);
function uploadDist(){
  for(let i=0;i<DW*DH;i++){
    const v=Math.min(255,Math.max(0,distData[i]*32));
    distPixels[i*4]=v;distPixels[i*4+1]=v;distPixels[i*4+2]=v;distPixels[i*4+3]=255;
  }
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,DW,DH,0,gl.RGBA,gl.UNSIGNED_BYTE,distPixels);
}
uploadDist();

function addToDist(x,y,str,radius){
  const sx=x/W*DW, sy=y/H*DH;
  // scale radius in dist-field pixels, correcting for aspect ratio
  // so the stamp is always circular in screen space
  const scaleX=DW/W, scaleY=DH/H;
  const srx=radius*scaleX, sry=radius*scaleY;
  const r=Math.ceil(Math.max(srx,sry));
  const x0=Math.max(0,Math.floor(sx-r)),x1=Math.min(DW-1,Math.ceil(sx+r));
  const y0=Math.max(0,Math.floor(sy-r)),y1=Math.min(DH-1,Math.ceil(sy+r));
  for(let py=y0;py<=y1;py++) for(let px=x0;px<=x1;px++){
    const dx=(px-sx)/srx, dy=(py-sy)/sry;
    const d2=dx*dx+dy*dy;
    if(d2<1){const f=1-d2;distData[py*DW+px]+=str*f*f;}
  }
}

const PALETTES=[
  [[1,.22,.04],[1,.67,.0],[.59,.04,.92],[0,.78,1]],
  [[0,.9,.55],[0,.59,1],[.51,0,.92],[1,.9,.2]],
  [[1,.04,.39],[.9,.22,.98],[.22,0,.9],[0,.86,1]],
  [[1,.51,0],[1,.18,0],[.67,.96,0],[0,.27,.96]],
  [[.86,.9,1],[.55,.72,1],[.22,.43,.94],[.03,.03,.22]],
];
let pi=0,nextP=1100,morphSrc=PALETTES[0],morphDst=PALETTES[1],morphT=1,tick=0;
function ss(x){return x*x*(3-2*x);}
function lerpP(a,b,tt){return a.map((v,i)=>v+(b[i]-v)*tt);}
function getPal(){return morphT>=1?morphDst:morphSrc.map((v,i)=>lerpP(v,morphDst[i],ss(morphT)));}

const blobs=Array.from({length:6},(_,i)=>({
  x:W*(0.18+i*0.13),y:H*(0.28+Math.sin(i*2.1)*0.28),
  vx:(Math.random()-.5)*0.1,vy:(Math.random()-.5)*0.08,
  r:W*(0.13+i*0.015),
  dx:Math.random()*Math.PI*2,dy:Math.random()*Math.PI*2,
  dsx:0.0004+Math.random()*0.0003,dsy:0.0003+Math.random()*0.0003,
  ph:i*1.3,ps:0.0012+i*0.0005,
  mass:0.8+i*0.1,tvx:0,tvy:0,
}));



function toCanvas(clientX,clientY){
  const r=cv.getBoundingClientRect();
  return{x:(clientX-r.left)*(W/r.width),y:(clientY-r.top)*(H/r.height)};
}

// detect touch device
const isTouchDevice=('ontouchstart' in window)||navigator.maxTouchPoints>1;

// ── inertia ghost ─────────────────────────────────────────────────────────────
// After release with velocity, a ghost attractor drifts in that direction
const MAX_GHOSTS=8;
const ghosts=[]; // touch inertia ghosts {x,y,vx,vy,energy}
function spawnGhost(x,y,vx,vy,energy){
  if(ghosts.length>=MAX_GHOSTS) ghosts.shift();
  ghosts.push({x,y,vx,vy,energy,maxEnergy:energy});
}



// ── mouse droplets ────────────────────────────────────────────────────────────
// Each click spawns an independent droplet with its own lifecycle
const MAX_DROPLETS=6;
const droplets=[]; // {x,y,smx,smy,pressure,clickPressure,holdTime,easedHold,released,energy,lastShaderClick}
let activeDroplet=null; // currently held droplet
let mouseDown=false;
let rawX=W/2,rawY=H/2; // current mouse position (while held)

function spawnDroplet(x,y){
  const d={
    x,y,smx:x,smy:y,smx2:x,smy2:y,
    pressure:0,clickPressure:0,holdTime:0,easedHold:0,
    released:false,energy:1.0,lastShaderClick:0
  };
  if(droplets.length>=MAX_DROPLETS) droplets.shift();
  droplets.push(d);
  return d;
}



cv.addEventListener('mousemove',e=>{
  if(isTouchDevice) return;
  if(!mouseDown) return;
  const p=toCanvas(e.clientX,e.clientY);
  rawX=p.x; rawY=p.y;
  if(activeDroplet){activeDroplet.x=p.x; activeDroplet.y=p.y;}
});
cv.addEventListener('mousedown',e=>{
  if(isTouchDevice) return;
  const p=toCanvas(e.clientX,e.clientY);
  rawX=p.x; rawY=p.y;
  mouseDown=true;
  activeDroplet=spawnDroplet(p.x,p.y);
  addToDist(p.x,H-p.y,4.0,55);
});
cv.addEventListener('mouseup',()=>{
  if(isTouchDevice) return;
  mouseDown=false;
  if(activeDroplet){activeDroplet.released=true; activeDroplet=null;}
});
cv.addEventListener('mouseleave',()=>{
  if(isTouchDevice) return;
  mouseDown=false;
  if(activeDroplet){activeDroplet.released=true; activeDroplet=null;}
});



// ── multi-touch (iOS) ─────────────────────────────────────────────────────────
const MAX_T=5;
const tTouches={};
function getTouchState(id,x,y){
  if(!tTouches[id]) tTouches[id]={
    rawX:x,rawY:y,smx:x,smy:y,smx2:x,smy2:y,
    pressure:0,clickPressure:0,holdTime:0,easedHold:0,
    released:false,fadeIn:0,lastShaderClick:0,slot:undefined,
    prevX:x,prevY:y,vx:0,vy:0
  };
  return tTouches[id];
}

function onTouchDown(id,x,y){
  const ts=getTouchState(id,x,y);
  ts.rawX=x;ts.rawY=y;ts.smx=x;ts.smy=y;ts.smx2=x;ts.smy2=y;
  ts.clickPressure=0;ts.holdTime=0;ts.easedHold=0;
  ts.released=false;ts.fadeIn=0;ts.lastShaderClick=0;
  ts.prevX=x;ts.prevY=y;ts.vx=0;ts.vy=0;
  // drop pulse
  addToDist(x,H-y,4.0,55);
}
function onTouchMove(id,x,y){
  const ts=tTouches[id];
  if(ts&&!ts.released){ts.rawX=x;ts.rawY=y;}
}
function onTouchUp(id){
  const ts=tTouches[id];
  if(!ts) return;
  const speed=Math.sqrt(ts.vx*ts.vx+ts.vy*ts.vy);
  if(speed>1.5) spawnGhost(ts.smx2,H-ts.smy2,ts.vx*0.7,-ts.vy*0.7,
    Math.min(0.4+speed*0.04,1.2));
  ts.released=true;
}

if(window.PointerEvent&&isTouchDevice){
  cv.addEventListener('pointerdown',e=>{
    if(e.pointerType==='mouse') return;
    e.preventDefault();
    const p=toCanvas(e.clientX,e.clientY);
    onTouchDown(e.pointerId,p.x,p.y);
    try{cv.setPointerCapture(e.pointerId);}catch(err){}
  },{passive:false});
  cv.addEventListener('pointermove',e=>{
    if(e.pointerType==='mouse') return;
    e.preventDefault();
    const p=toCanvas(e.clientX,e.clientY);
    onTouchMove(e.pointerId,p.x,p.y);
  },{passive:false});
  cv.addEventListener('pointerup',e=>{
    if(e.pointerType==='mouse') return;
    e.preventDefault();
    onTouchUp(e.pointerId);
  },{passive:false});
  cv.addEventListener('pointercancel',e=>{
    if(tTouches[e.pointerId]) tTouches[e.pointerId].released=true;
  },{passive:false});
} else {
  cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const p=toCanvas(t.clientX,t.clientY);
      onTouchDown(t.identifier,p.x,p.y);
    }
  },{passive:false});
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const p=toCanvas(t.clientX,t.clientY);
      onTouchMove(t.identifier,p.x,p.y);
    }
  },{passive:false});
  cv.addEventListener('touchend',e=>{
    e.preventDefault();
    for(const t of e.changedTouches) onTouchUp(t.identifier);
  },{passive:false});
  cv.addEventListener('touchcancel',e=>{
    for(const t of e.changedTouches){
      if(tTouches[t.identifier]) tTouches[t.identifier].released=true;
    }
  },{passive:false});
}

window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>{setTimeout(resize,100);});

let t=0;
let flickerA=1.0,flickerTarget=1.0,flickerB=1.0;
let pNoiseX=Math.random()*10,pNoiseY=Math.random()*10;
let fc=0,lastTime=0,holdTime=0,easedHold=0,lastMouseShaderClick=0;
function loop(){
  const now=performance.now();const dt=Math.min((now-(lastTime||now))/1000,0.05);lastTime=now;t+=dt;tick++;
  morphT=Math.min(1,morphT+0.002);
  if(tick>=nextP){
    morphSrc=getPal();pi=(pi+1)%PALETTES.length;morphDst=PALETTES[pi];morphT=0;
    nextP=tick+900+Math.floor(Math.random()*400);
  }
  // ── mouse droplets (desktop) ─────────────────────────────────────────────
  const dLerp1=1-Math.pow(1-0.28,dt*60);
  const dLerp2=1-Math.pow(1-0.18,dt*60);
  for(let di=droplets.length-1;di>=0;di--){
    const d=droplets[di];
    const isActive=!d.released;
    d.smx+=(d.x-d.smx)*dLerp1; d.smy+=(d.y-d.smy)*dLerp1;
    d.smx2+=(d.smx-d.smx2)*dLerp2; d.smy2+=(d.smy-d.smy2)*dLerp2;
    const dGlY=H-d.smy2;
    if(isActive){
      d.pressure+=(1-d.pressure)*0.035;
      d.clickPressure+=(1-d.clickPressure)*0.018;
      d.holdTime=Math.min(d.holdTime+dt*0.4,8.0);
      const rawHold=1.0-Math.exp(-d.holdTime*0.6);
      d.easedHold+=(rawHold-d.easedHold)*0.03;
      const dHoldStr=d.easedHold;
      const dStr=(1.2+d.clickPressure*2.0+dHoldStr*3.0)*d.pressure;
      const dRadius=48+d.clickPressure*38+dHoldStr*60;
      addToDist(d.smx2,dGlY,dStr,dRadius);
      const shaderClick=(d.clickPressure+dHoldStr*1.5)*d.pressure;
      d.lastShaderClick=shaderClick;
      // capture exact values each frame so release is seamless
      d.releaseClickStr=shaderClick;
      d.releasePressure=d.pressure;
      d.releaseDistStr=dStr;
      d.releaseDistR=dRadius;
      blobs.forEach(b=>{
        const bdx=b.x-d.smx2,bdy=b.y-dGlY;
        const bd=Math.sqrt(bdx*bdx+bdy*bdy)+0.001;
        const zone=b.r*2.5;
        if(bd<zone){
          const force=(1-bd/zone)*(0.003+d.clickPressure*0.006)/b.mass;
          b.tvx-=(bdx/bd)*force; b.tvy-=(bdy/bd)*force;
        }
      });
    } else {
      // initialise release — values already captured each active frame
      if(d.releaseEnergy===undefined){
        d.releaseEnergy=1.0;
        // fallback if released before loop ran (fast tap)
        if(!d.releaseClickStr) d.releaseClickStr=d.lastShaderClick||0.01;
        if(!d.releasePressure) d.releasePressure=d.pressure||0.01;
      }
      d.releaseEnergy*=Math.pow(0.55,dt);
      const re=d.releaseEnergy;
      // dist field stamp using captured active values so no jump at transition
      const ghostStr=(d.releaseDistStr||d.releaseClickStr||0.1)*re;
      const ghostR=(d.releaseDistR||48)*Math.max(0.5,re);
      if(ghostStr>0.01) addToDist(d.smx2,dGlY,ghostStr,ghostR);
      if(re<0.01) droplets.splice(di,1);
    }
  }


  pNoiseX+=0.003; pNoiseY+=0.002;
  for(let i=0;i<distData.length;i++) distData[i]*=0.991;

  // ── touch (iOS multitouch) ─────────────────────────────────────────────────
  const allTouchIds=Object.keys(tTouches);
  const activeTouchIds=allTouchIds.filter(id=>!tTouches[id].released);
  const releasingTouchIds=allTouchIds.filter(id=>tTouches[id].released);
  allTouchIds.forEach(id=>{
    if(tTouches[id].slot===undefined){
      const used=new Set(allTouchIds.filter(i=>i!==id&&tTouches[i].slot!==undefined).map(i=>tTouches[i].slot));
      for(let s=0;s<MAX_T;s++){if(!used.has(s)){tTouches[id].slot=s;break;}}
    }
  });
  const touchIds=allTouchIds.filter(id=>tTouches[id].slot!==undefined).sort((a,b)=>tTouches[a].slot-tTouches[b].slot);
  const tPosArr=new Float32Array(10);
  const tStrArr=new Float32Array(5);
  const tClickArr=new Float32Array(5);

  touchIds.forEach((id,i)=>{
    const ts=tTouches[id];
    const isReleasing=ts.released;
    if(!isReleasing){
      const tLerp1=1-Math.pow(1-0.28,dt*60);
      const tLerp2=1-Math.pow(1-0.18,dt*60);
      ts.smx+=(ts.rawX-ts.smx)*tLerp1; ts.smy+=(ts.rawY-ts.smy)*tLerp1;
      const ps2x=ts.smx2,ps2y=ts.smy2;
      ts.smx2+=(ts.smx-ts.smx2)*tLerp2; ts.smy2+=(ts.smy-ts.smy2)*tLerp2;
      // track velocity for inertia
      ts.vx=(ts.smx2-ps2x); ts.vy=(ts.smy2-ps2y);
      ts.pressure+=(1-ts.pressure)*0.035;
      ts.clickPressure+=(1-ts.clickPressure)*0.018;
      ts.fadeIn=Math.min(ts.fadeIn+dt*2.5,1.0);
      ts.holdTime=Math.min(ts.holdTime+dt*0.4,8.0);
      const tRawHold=1.0-Math.exp(-ts.holdTime*0.6);
      ts.easedHold+=(tRawHold-ts.easedHold)*0.03;
      const tGlY=H-ts.smy2;
      const tSpd=Math.sqrt(ts.vx*ts.vx+ts.vy*ts.vy);
      if(tSpd>0.2||ts.clickPressure>0.05)
        addToDist(ts.smx2,tGlY,(1.2+ts.clickPressure*2.0+ts.easedHold*3.0)*ts.pressure*ts.fadeIn,48+ts.clickPressure*38+ts.easedHold*60);
      blobs.forEach(b=>{
        const bdx=b.x-ts.smx2,bdy=b.y-tGlY;
        const bd=Math.sqrt(bdx*bdx+bdy*bdy)+0.001;
        const zone=b.r*2.5;
        if(bd<zone){
          const force=(1-bd/zone)*(0.003+ts.clickPressure*0.006)/b.mass;
          b.tvx-=(bdx/bd)*force; b.tvy-=(bdy/bd)*force;
        }
      });
      const shaderClick=(ts.clickPressure+ts.easedHold*1.5)*ts.fadeIn;
      tClickArr[i]=shaderClick;
      ts.lastShaderClick=shaderClick;
      tPosArr[i*2]=ts.smx2; tPosArr[i*2+1]=tGlY;
      tStrArr[i]=ts.pressure*ts.fadeIn;
    } else {
      if(ts.releaseEnergy===undefined)
        ts.releaseEnergy=ts.lastShaderClick!==undefined?ts.lastShaderClick:Math.max(ts.easedHold+ts.clickPressure*0.5,0.01);
      ts.releaseEnergy*=Math.pow(0.55,dt);
      ts.holdTime=Math.max(ts.holdTime-dt*0.5,0.0);
      const tRawHold=(1.0-Math.exp(-ts.holdTime*0.6))*ts.releaseEnergy;
      ts.easedHold+=(tRawHold-ts.easedHold)*0.06;
      ts.clickPressure=ts.releaseEnergy*0.5;
      ts.pressure=Math.max(ts.pressure-dt*0.4,0.0);
      const tGlY=H-ts.smy2;
      const ghostStr=(ts.clickPressure*1.8+ts.easedHold*2.5)*ts.releaseEnergy;
      if(ghostStr>0.01) addToDist(ts.smx2,tGlY,ghostStr,48+ts.clickPressure*30+ts.easedHold*50);
      const re=ts.releaseEnergy;
      const baseClick=ts.lastShaderClick!==undefined?ts.lastShaderClick:(ts.clickPressure+ts.easedHold*1.5);
      tPosArr[i*2]=ts.smx2; tPosArr[i*2+1]=tGlY;
      tStrArr[i]=ts.pressure;
      tClickArr[i]=baseClick*re;
      if(ts.releaseEnergy<0.01) delete tTouches[id];
    }
  });

  // ── blobs drift ───────────────────────────────────────────────────────────
  // (droplets handle blob interaction in their own loop above)
  blobs.forEach(b=>{
    b.dx+=b.dsx; b.dy+=b.dsy; b.ph+=b.ps;
    b.vx+=(b.tvx-b.vx)*0.06; b.vy+=(b.tvy-b.vy)*0.06;
    b.tvx*=0.90; b.tvy*=0.90;
    b.x+=b.vx+Math.sin(b.dx)*0.18+Math.sin(b.ph)*0.10;
    b.y+=b.vy+Math.cos(b.dy)*0.14+Math.cos(b.ph*0.7)*0.08;
    b.vx+=(Math.random()-.5)*0.003; b.vy+=(Math.random()-.5)*0.003;
    b.vx*=0.999; b.vy*=0.999;
    b.vx=Math.max(-.3,Math.min(.3,b.vx)); b.vy=Math.max(-.3,Math.min(.3,b.vy));
    if(b.x<-b.r)b.x=W+b.r; if(b.x>W+b.r)b.x=-b.r;
    if(b.y<-b.r)b.y=H+b.r; if(b.y>H+b.r)b.y=-b.r;
  });

  // ── shader uniforms ─────────────────────────────────────────────────────────
  const pal=getPal();
  gl.viewport(0,0,W,H);
  gl.uniform2f(uRes,W,H);
  gl.uniform1f(uTime,t);
  gl.uniform2fv(uBlobs,blobs.flatMap(b=>[b.x,b.y]));
  gl.uniform1fv(uBlobR,blobs.map(b=>b.r));

  if(!isTouchDevice){
    // all droplets go into attractor slots — no primary/secondary split
    // slot 0 = uMouse (always used), slots 1+ = tPos
    const allD=droplets.slice(-MAX_T);
    // primary slot (uMouse)
    const d0=allD[allD.length-1]||null;
    if(d0){
      const re=d0.released?(d0.releaseEnergy!==undefined?d0.releaseEnergy:0):1.0;
      const d0Click=d0.released?(d0.releaseClickStr||d0.lastShaderClick)*re:d0.lastShaderClick;
      const d0Str=d0.released?(d0.releasePressure||d0.pressure)*re:d0.pressure;
      gl.uniform2f(uMouse,d0.smx2,H-d0.smy2);
      gl.uniform1f(uMouseStr,d0Str);
      gl.uniform1f(uClickStr,d0Click);
    } else {
      gl.uniform2f(uMouse,W/2,H/2);
      gl.uniform1f(uMouseStr,0.0);
      gl.uniform1f(uClickStr,0.0);
    }
    gl.uniform1f(uHoldStr,0.0);
    // extra slots for older droplets
    const extraD=allD.slice(0,-1);
    const odPos=new Float32Array(10);
    const odStr=new Float32Array(5);
    const odClick=new Float32Array(5);
    extraD.forEach((d,i)=>{
      const re=d.released?(d.releaseEnergy!==undefined?d.releaseEnergy:0):1.0;
      const dClick=d.released?(d.releaseClickStr||d.lastShaderClick)*re:d.lastShaderClick;
      const dStr=d.released?(d.releasePressure||d.pressure)*re:d.pressure;
      odPos[i*2]=d.smx2; odPos[i*2+1]=H-d.smy2;
      odStr[i]=dStr;
      odClick[i]=dClick;
    });
    gl.uniform2fv(uTPos,odPos);
    gl.uniform1fv(uTStr,odStr);
    gl.uniform1fv(uTClick,odClick);
    gl.uniform1i(uTCount,extraD.length);
  } else {
    // touch
    const pri=touchIds.length>0?tTouches[touchIds[0]]:null;
    if(pri){
      gl.uniform2f(uMouse,pri.smx2,H-pri.smy2);
      gl.uniform1f(uMouseStr,tStrArr[0]);
      gl.uniform1f(uClickStr,tClickArr[0]);
    } else {
      gl.uniform2f(uMouse,W/2,H/2);
      gl.uniform1f(uMouseStr,0.0);
      gl.uniform1f(uClickStr,0.0);
    }
    gl.uniform1f(uHoldStr,0.0);
    gl.uniform2fv(uTPos,tPosArr);
    gl.uniform1fv(uTStr,tStrArr);
    gl.uniform1fv(uTClick,tClickArr);
    gl.uniform1i(uTCount,touchIds.length);
  }

  gl.uniform4f(uC0,...pal[0],1);gl.uniform4f(uC1,...pal[1],1);
  gl.uniform4f(uC2,...pal[2],1);gl.uniform4f(uC3,...pal[3],1);
  gl.uniform1f(uGrain,Math.random());
  gl.uniform1f(uFlickerA,flickerA);
  gl.uniform1f(uFlickerB,flickerB);
  gl.uniform2f(uPressureNoise,pNoiseX,pNoiseY);
  fc++;
  if(fc%3===0)uploadDist();
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
